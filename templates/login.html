<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Budget Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f4f7f6;
            --surface: #ffffff;
            --text-main: #2b2d42;
            --text-muted: #8d99ae;
            --primary: #4361ee;
            --primary-hover: #3a56d4;
            --border: #edf2f4;
            --shadow: rgba(0, 0, 0, 0.05) 0px 4px 20px;
        }
        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 420px;
            padding: 24px;
        }
        .card {
            background: var(--surface);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 36px;
        }
        h1 {
            margin: 0 0 20px;
            font-size: 2rem;
            line-height: 1.1;
        }
        p {
            margin: 0 0 24px;
            color: var(--text-muted);
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 18px;
        }
        label {
            font-weight: 600;
        }
        input {
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            background: var(--bg-color);
            color: var(--text-main);
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.12);
        }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-weight: 700;
            cursor: pointer;
        }
        button:hover {
            background: var(--primary-hover);
        }
        .footer {
            margin-top: 20px;
            text-align: center;
            color: var(--text-muted);
        }
        .link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        .flash-message {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .flash-message.success { background: #e6f4ea; color: #1e4620; }
        .flash-message.error { background: #fde8e8; color: #7d1717; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Welcome back</h1>
            <p>Log in to manage your budget and track transactions.</p>
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash-message {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
            {% endwith %}
            <form action="/login" method="post">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" name="username" id="username" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" required>
                </div>
                <div class="input-group" style="margin-bottom:6px;">
                    <label for="savedAccounts">Saved Accounts</label>
                    <div style="display:flex; gap:8px; align-items:center;">
                        <select id="savedAccounts" style="flex:1; padding:12px 8px; border-radius:8px; border:1px solid var(--border); background:var(--bg-color);"></select>
                        <button type="button" id="useAccount" style="padding:10px 12px; border-radius:8px; border:none; background:var(--primary); color:#fff; font-weight:700;">Use</button>
                        <button type="button" id="deleteAccount" title="Delete selected" style="padding:10px 12px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--text-muted);">✕</button>
                    </div>
                </div>
                <div class="input-group" style="flex-direction:row; align-items:center; gap:12px; margin-bottom:6px;">
                    <label style="margin:0; font-weight:600;">Remember credentials</label>
                    <input type="checkbox" id="remember" name="remember">
                </div>
                <button type="submit">Log In</button>
            </form>
            <div class="footer">
                <span>Don't have an account?</span>
                <a class="link" href="/register">Register</a>
            </div>
        </div>
    </div>
</body>
    <script>
        // Multiple-account remember using localStorage
        const savedKey = 'budget_saved_accounts_v1';
        const sel = document.getElementById('savedAccounts');
        const useBtn = document.getElementById('useAccount');
        const delBtn = document.getElementById('deleteAccount');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const rememberCheckbox = document.getElementById('remember');

        function loadAccounts(){
            sel.innerHTML = '';
            let list = [];
            try{ list = JSON.parse(localStorage.getItem(savedKey) || '[]'); }catch(e){ list = []; }
            if(list.length === 0){
                const opt = document.createElement('option'); opt.text = 'No saved accounts'; opt.value=''; sel.add(opt);
                return;
            }
            list.forEach(acc => {
                const opt = document.createElement('option'); opt.text = acc.username; opt.value = acc.username; sel.add(opt);
            });
        }

        function saveAccount(username, password){
            if(!username) return;
            let list = [];
            try{ list = JSON.parse(localStorage.getItem(savedKey) || '[]'); }catch(e){ list = []; }
            // replace if username exists
            const idx = list.findIndex(a=>a.username===username);
            if(idx>=0) list[idx] = {username, password}; else list.push({username, password});
            localStorage.setItem(savedKey, JSON.stringify(list));
            loadAccounts();
        }

        function deleteSelected(){
            const user = sel.value;
            if(!user) return;
            let list = [];
            try{ list = JSON.parse(localStorage.getItem(savedKey) || '[]'); }catch(e){ list = []; }
            list = list.filter(a=>a.username !== user);
            localStorage.setItem(savedKey, JSON.stringify(list));
            loadAccounts();
        }

        useBtn?.addEventListener('click', ()=>{
            const user = sel.value;
            if(!user) return;
            let list = [];
            try{ list = JSON.parse(localStorage.getItem(savedKey) || '[]'); }catch(e){ list = []; }
            const acc = list.find(a=>a.username===user);
            if(acc){ usernameInput.value = acc.username; passwordInput.value = acc.password; }
        });

        delBtn?.addEventListener('click', ()=>{ deleteSelected(); });

        // On form submit, if remember is checked, save credentials
        document.querySelector('form[action="/login"]').addEventListener('submit', (e)=>{
            if(rememberCheckbox && rememberCheckbox.checked){
                saveAccount(usernameInput.value.trim(), passwordInput.value);
            }
        });

        loadAccounts();
    </script>
</html>
