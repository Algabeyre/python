<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Budget Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f4f7f6;
            --surface: #ffffff;
            --text-main: #2b2d42;
            --text-muted: #8d99ae;
            --primary: #4361ee;
            --primary-hover: #3a56d4;
            --border: #edf2f4;
            --shadow: rgba(0, 0, 0, 0.05) 0px 4px 20px;
        }
        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 420px;
            padding: 24px;
        }
        .card {
            background: var(--surface);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 36px;
        }
        h1 {
            margin: 0 0 20px;
            font-size: 2rem;
            line-height: 1.1;
        }
        p {
            margin: 0 0 24px;
            color: var(--text-muted);
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 18px;
        }
        label {
            font-weight: 600;
        }
        input {
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            background: var(--bg-color);
            color: var(--text-main);
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.12);
        }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-weight: 700;
            cursor: pointer;
        }
        button:hover {
            background: var(--primary-hover);
        }
        .footer {
            margin-top: 20px;
            text-align: center;
            color: var(--text-muted);
        }
        .link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        .flash-message {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .flash-message.success { background: #e6f4ea; color: #1e4620; }
        .flash-message.error { background: #fde8e8; color: #7d1717; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Welcome back</h1>
            <p>Log in to manage your budget and track transactions.</p>
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash-message {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
            {% endwith %}
            <form action="/login" method="post">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" name="username" id="username" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" required>
                </div>
                <button type="submit">Log In</button>
            </form>
            <div class="footer">
                <span>Don't have an account?</span>
                <a class="link" href="/register">Register</a>
            </div>
        </div>
    </div>
</body>
</html>
