<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Transaction</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f4f7f6;
            --surface: #ffffff;
            --text-main: #2b2d42;
            --primary: #4361ee;
            --primary-hover: #3a56d4;
            --border: #edf2f4;
            --shadow: rgba(0, 0, 0, 0.05) 0px 4px 20px;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .section-box {
            background: var(--surface);
            border-radius: 16px;
            padding: 40px;
            box-shadow: var(--shadow);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 30px;
            text-align: center;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.95rem;
            font-weight: 500;
        }

        input, select {
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.15);
        }

        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        button, .btn-cancel {
            flex: 1;
            text-align: center;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            box-sizing: border-box;
        }

        button[type="submit"] {
            background-color: var(--primary);
            color: white;
            border: none;
        }

        button[type="submit"]:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-cancel {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--border);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-cancel:hover {
            background-color: var(--bg-color);
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="section-box">
            <h1>Edit Transaction</h1>
            <form action="/edit/{{ transaction.id }}" method="post">
                <div class="input-group">
                    <label for="type">Type</label>
                    <select name="type" id="type" required>
                        <option value="income" {% if transaction.type == 'income' %}selected{% endif %}>Income</option>
                        <option value="expense" {% if transaction.type == 'expense' %}selected{% endif %}>Expense</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label for="category">Category</label>
                    <input type="text" name="category" id="category" value="{{ transaction.category }}" required>
                </div>
                
                <div class="input-group">
                    <label for="amount">Amount ($)</label>
                    <input type="number" step="0.01" name="amount" id="amount" value="{{ transaction.amount }}" required>
                </div>
                
                <div class="input-group">
                    <label for="description">Description</label>
                    <input type="text" name="description" id="description" value="{{ transaction.description }}">
                </div>
                
                <div class="buttons">
                    <a href="/" class="btn-cancel">Cancel</a>
                    <button type="submit">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
